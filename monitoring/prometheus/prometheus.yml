global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'litter-detection-monitoring'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OpenTelemetry Collector (Prometheus exporter)
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  # Tempo (metrics)
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']

  # Training metrics (will be scraped from Python app)
  - job_name: 'litter-training'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:8001']

remote_write:
  - url: "http://otel-collector:4317/api/v1/write"
